services:
  volumen-postgres:
    image: postgres:17
    container_name: volumen-postgres
    environment:
      POSTGRES_DB: volumen
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - volumen-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d volumen"]
      interval: 5s
      timeout: 5s
      retries: 10

  volumen-ocr:
    build:
      context: ./volumen-ocr
    container_name: volumen-ocr
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  volumen-backend:
    build:
      context: ./volumen-backend
    container_name: volumen-backend
    environment:
      DB_URL: jdbc:postgresql://volumen-postgres:5432/volumen
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      OCR_SERVICE_URL: http://volumen-ocr:8000
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      volumen-postgres:
        condition: service_healthy
      volumen-ocr:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  volumen-web:
    build:
      context: ./volumen-web
      args:
        VITE_API_URL: http://localhost:${SERVER_PORT}
    container_name: volumen-web
    ports:
      - "80:80"
    depends_on:
      volumen-backend:
        condition: service_healthy

volumes:
  volumen-postgres-data:
